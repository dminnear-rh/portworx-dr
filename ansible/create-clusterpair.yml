#!/usr/bin/env ansible-playbook
---
- name: Establish Portworx Disaster Recovery Pair
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    primary_kubeconfig: "/path/to/your/primary.kubeconfig"
    secondary_kubeconfig: "/path/to/your/secondary.kubeconfig"
    app_namespace: "boutique" # Target namespace for DR
    s3_region: "us-east-2" # AWS S3 Bucket Region
    s3_endpoint: "s3.amazonaws.com"
    px_cred_name: "aws-dr-creds" # Credential name as it will be known inside Portworx

  tasks:
    - name: Ensure application namespace exists on Primary
      kubernetes.core.k8s:
        kubeconfig: "{{ primary_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ app_namespace }}"

    - name: Read AWS credentials from default profile
      set_fact:
        aws_access_key: "{{ lookup('ini', 'aws_access_key_id section=default file=~/.aws/credentials') }}"
        aws_secret_key: "{{ lookup('ini', 'aws_secret_access_key section=default file=~/.aws/credentials') }}"

    - name: Get Primary NLB Hostname
      kubernetes.core.k8s_info:
        kubeconfig: "{{ primary_kubeconfig }}"
        kind: Service
        name: portworx-api
        namespace: portworx
      register: primary_svc

    - name: Get Secondary NLB Hostname
      kubernetes.core.k8s_info:
        kubeconfig: "{{ secondary_kubeconfig }}"
        kind: Service
        name: portworx-api
        namespace: portworx
      register: secondary_svc

    - name: Set NLB Hostname Facts
      set_fact:
        primary_ext_ep: "{{ primary_svc.resources[0].status.loadBalancer.ingress[0].hostname }}"
        secondary_ext_ep: "{{ secondary_svc.resources[0].status.loadBalancer.ingress[0].hostname }}"

    - name: Generate ClusterPair
      command: >
        storkctl create clusterpair {{ app_namespace }}-clusterpair
          --namespace {{ app_namespace }}
          --src-kube-file {{ primary_kubeconfig }}
          --dest-kube-file {{ secondary_kubeconfig }}
          --provider s3
          --s3-access-key {{ aws_access_key }}
          --s3-secret-key {{ aws_secret_key }}
          --s3-region {{ s3_region }}
          --s3-endpoint {{ s3_endpoint }}
          --src-ep {{ primary_ext_ep }}:9001
          --dest-ep {{ secondary_ext_ep }}:9001
      register: clusterpair_generation
