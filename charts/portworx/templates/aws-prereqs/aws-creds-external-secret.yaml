{{- if .Values.secrets.useExternalSecrets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.AWSsecretName }}-es
  namespace: {{ .Values.secrets.AWSsecretNamespace }}
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secrets.AWSsecretName }}
    template:
      type: Opaque
      engineVersion: v2
      data:
        AWS_ACCESS_KEY: "{{ `{{ .aws_access_key }}` }}"
        AWS_SECRET_KEY: "{{ `{{ .aws_secret_key }}` }}"
  data:
  - secretKey: aws_access_key
    remoteRef:
      key: secret/data/hub/aws-creds
      property: aws_access_key_id
  - secretKey: aws_secret_key
    remoteRef:
      key: secret/data/hub/aws-creds
      property: aws_secret_access_key
{{- end }}
