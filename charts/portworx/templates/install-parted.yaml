{{- if .Values.installParted}}
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-worker-install-parted
spec:
  config:
    ignition:
      version: 3.2.0
    systemd:
      units:
      - name: install-parted.service
        enabled: true
        contents: |
          [Unit]
          Description=Extract parted binary from CentOS Stream RPM
          Wants=network-online.target
          After=network-online.target
          ConditionPathExists=!/usr/sbin/parted

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStartPre=/usr/bin/mkdir -p /tmp/parted-install
          ExecStart=/usr/bin/bash -c ' \
            cd /tmp/parted-install && \
            curl -L -o parted.rpm https://mirror.stream.centos.org/9-stream/BaseOS/x86_64/os/Packages/parted-3.5-3.el9.x86_64.rpm && \
            rpm2cpio parted.rpm | cpio -idmv && \
            rm -f /usr/sbin/parted /sbin/parted /usr/local/bin/parted && \
            cp usr/sbin/parted /usr/sbin/parted && \
            cp usr/sbin/parted /sbin/parted && \
            cp usr/sbin/parted /usr/local/bin/parted && \
            chmod 755 /usr/sbin/parted /sbin/parted /usr/local/bin/parted'

          [Install]
          WantedBy=multi-user.target
---
# Wait for 10 minutes after installing parted to give all nodes time to restart before installing Portworx
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-ten-minutes
  labels:
    app: sleeper-service
spec:
  backoffLimit: 4
  template:
    spec:
      containers:
      - name: sleep-container
        image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
        command:
          - "/bin/bash"
          - "-c"
          - "echo 'Starting 10-minute sleep...'; sleep 600; echo 'Sleep finished.'"
      restartPolicy: Never
{{- end }}
